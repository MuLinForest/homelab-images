name: Build caddy-with-dns

on:
  schedule:
    - cron: '0 3 * * *'  # 每天凌晨 3 點檢查
  push:
    paths:
      - 'caddy/Dockerfile'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get upstream Caddy digest
        id: upstream
        run: |
          DIGEST=$(docker manifest inspect caddy:builder --verbose 2>/dev/null | \
            python3 -c "import sys,json; data=json.load(sys.stdin); print(data['SchemaV2Manifest']['config']['digest'])" 2>/dev/null || \
            curl -s "https://hub.docker.com/v2/repositories/library/caddy/tags/builder" | \
            python3 -c "import sys,json; print(json.load(sys.stdin)['digest'])")
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Get last built digest
        id: last
        run: |
          DIGEST=$(curl -s http://192.168.50.21:5000/v2/caddy-with-dns/manifests/latest \
            -H "Accept: application/vnd.docker.distribution.manifest.v2+json" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('config',{}).get('digest','none'))" 2>/dev/null || echo "none")
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT

      - name: Check if rebuild needed
        id: check
        run: |
          if [ "${{ steps.upstream.outputs.digest }}" = "${{ steps.last.outputs.digest }}" ]; then
            echo "rebuild=false" >> $GITHUB_OUTPUT
            echo "No update needed."
          else
            echo "rebuild=true" >> $GITHUB_OUTPUT
            echo "New upstream detected, rebuilding."
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.rebuild == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        if: steps.check.outputs.rebuild == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./caddy
          push: true
          tags: 192.168.50.21:5000/caddy-with-dns:latest
