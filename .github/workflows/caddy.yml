name: Build caddy-with-dns

on:
  schedule:
    - cron: '0 3 * * *'  # 每天凌晨 3 點
  push:
    paths:
      - 'caddy/Dockerfile'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./caddy
          push: true
          tags: ghcr.io/${{ github.repository_owner | lower }}/caddy-with-dns:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
